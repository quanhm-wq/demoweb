<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kiosk Check-in — Smart Pickleball</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/admin.css" />
</head>
<body>
  <div class="admin">
  <div id="side"></div>
  <div class="a-main">
  <div id="top"></div>
  <div class="a-content">
  <main class="container" style="max-width:980px;">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:18px;">
      <div>
        <h1 style="font-size:24px;margin:0;">Kiosk check-in</h1>
        <p class="muted" style="margin:4px 0 0;">Quét khuôn mặt để tự nhận diện · xếp sân theo trình độ · trừ số buổi</p>
      </div>
      <span class="badge badge-green"><span class="live-dot" style="background:var(--color-accent)"></span> Camera sẵn sàng</span>
    </div>

    <div class="grid" style="grid-template-columns:1fr 1fr;gap:20px;">
      <!-- Camera -->
      <div class="card card-pad">
        <div class="scanner" id="cam" style="aspect-ratio:1;background:radial-gradient(circle at 50% 38%, #17233b, #0a0f1c);">
          <div class="face-frame"><span class="tl"></span><span class="tr"></span><span class="bl"></span><span class="br"></span></div>
          <div class="scanline" id="scanline" style="display:none;"></div>
          <div id="cam-face" style="position:absolute;inset:0;display:grid;place-items:center;overflow:hidden;"><span class="muted" style="font-size:13px;">Chưa có khuôn mặt trong khung</span></div>
          <div id="cam-hint" style="position:absolute;left:0;right:0;bottom:12px;text-align:center;font-size:13px;color:var(--color-muted-fg);">Đưa khuôn mặt vào khung</div>
        </div>
        <button class="btn btn-primary btn-block" id="scan-btn" style="margin-top:14px;"></button>

        <hr class="divider" />
        <div class="muted" style="font-size:13px;margin-bottom:8px;">Mô phỏng — chọn khuôn mặt "được camera nhận":</div>
        <div id="face-picker" class="grid" style="grid-template-columns:repeat(4,1fr);gap:8px;"></div>

        <div style="margin-top:14px;">
          <div class="field"><label>Hoặc nhập mã PIN</label>
            <div style="display:flex;gap:8px;">
              <input class="input num" id="pin-input" placeholder="4 chữ số" maxlength="4" inputmode="numeric" />
              <button class="btn btn-ghost" id="pin-btn">Xác nhận</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Kết quả -->
      <div class="card card-pad" id="result">
        <div id="result-empty" style="text-align:center;padding:40px 0;color:var(--color-muted-fg);">
          <div style="display:flex;justify-content:center;margin-bottom:10px;" id="empty-icon"></div>
          Chưa có check-in. Quét khuôn mặt hoặc nhập PIN để bắt đầu.
        </div>
        <div id="result-ok" style="display:none;"></div>
      </div>
    </div>

    <!-- Lịch sử check-in gần đây -->
    <div class="card card-pad" style="margin-top:20px;">
      <div style="font-weight:600;margin-bottom:10px;">Lượt check-in gần đây</div>
      <div id="recent" class="muted" style="font-size:14px;">Chưa có dữ liệu.</div>
    </div>
  </main>
  </div></div></div>

  <script src="assets/app.js"></script>
  <script>
    document.getElementById("side").innerHTML = SB.adminSidebar("checkin");
    document.getElementById("top").innerHTML = SB.adminTop("Check-in", "Quét khuôn mặt, xếp sân theo trình độ");
    document.getElementById("scan-btn").innerHTML = SB.icon("scan", 18) + " Quét khuôn mặt";
    document.getElementById("empty-icon").innerHTML = SB.icon("user", 40);

    let pickedFace = null;

    function renderPicker() {
      const s = SB.load();
      document.getElementById("face-picker").innerHTML = s.members.slice(0, 8).map(m =>
        `<button class="face-opt" data-idx="${m.faceIdx}" title="${m.name}">
           <img src="${SB.avatarUrl(m)}" alt="${m.name}" loading="lazy" />
           <span>${m.name.split(" ").slice(-1)[0]}</span>
         </button>`).join("");
      document.querySelectorAll(".face-opt").forEach(b => b.onclick = () => {
        pickedFace = +b.dataset.idx;
        document.querySelectorAll(".face-opt").forEach(x => x.classList.remove("selected"));
        b.classList.add("selected");
        const m = SB.load().members.find(x => x.faceIdx === pickedFace);
        document.getElementById("cam-face").innerHTML = `<img src="${SB.avatarUrl(m)}" alt="${m.name}" style="width:100%;height:100%;object-fit:cover;" />`;
      });
    }

    document.getElementById("scan-btn").onclick = () => {
      if (pickedFace == null) { SB.toast("Chọn khuôn mặt", "Ở bản demo, hãy chọn 1 khuôn mặt bên dưới trước.", "warn"); return; }
      runScan(() => doCheckin(SB.checkinByFace(pickedFace)));
    };

    document.getElementById("pin-btn").onclick = () => {
      const pin = document.getElementById("pin-input").value.trim();
      const s = SB.load();
      const b = s.bookings.find(x => x.pin === pin && !x.checkedIn);
      if (!b) { SB.toast("PIN không hợp lệ", "Không tìm thấy booking chưa check-in với PIN này.", "err"); return; }
      const m = s.members.find(x => x.id === b.memberId);
      runScan(() => doCheckin(SB.checkinByFace(m.faceIdx)));
    };

    function runScan(cb) {
      const sl = document.getElementById("scanline");
      const hint = document.getElementById("cam-hint");
      sl.style.display = "block"; hint.textContent = "Đang nhận diện...";
      document.getElementById("cam").style.borderColor = "var(--color-info)";
      document.getElementById("scan-btn").disabled = true;
      setTimeout(() => {
        sl.style.display = "none"; hint.textContent = "Đưa khuôn mặt vào khung";
        document.getElementById("cam").style.borderColor = "var(--color-border)";
        document.getElementById("scan-btn").disabled = false;
        cb();
      }, 1800);
    }

    function doCheckin(res) {
      if (!res.ok) { SB.toast("Không nhận diện được", res.reason, "err"); return; }
      const m = res.member;
      const lv = SB.LEVELS[m.level];
      const now = new Date();

      document.getElementById("result-empty").style.display = "none";
      const ok = document.getElementById("result-ok");
      ok.style.display = "block";
      ok.innerHTML = `
        <div style="display:flex;align-items:center;gap:14px;">
          <img src="${SB.avatarUrl(m)}" alt="${m.name}" style="width:64px;height:64px;border-radius:12px;object-fit:cover;border:1px solid var(--color-border);" />
          <div>
            <div class="badge badge-green" style="margin-bottom:6px;">${SB.icon("check",14)} Nhận diện thành công</div>
            <div style="font-size:22px;font-weight:700;">${m.name}</div>
            <div class="muted" style="font-size:14px;"><span class="level-dot ${lv.cls}"></span> ${lv.name} · ${m.racket}</div>
          </div>
        </div>
        <hr class="divider"/>
        <div class="grid" style="grid-template-columns:1fr 1fr;gap:14px;">
          <div class="stat"><span class="val" style="color:var(--color-accent)">Sân ${res.court}</span><span class="lbl">Sân được xếp (theo trình độ)</span></div>
          <div class="stat"><span class="val">${SB.fmtTime(now)}</span><span class="lbl">Giờ check-in</span></div>
          <div class="stat"><span class="val">${m.sessionsLeft}</span><span class="lbl">Buổi còn lại ${res.deducted ? "(-1)" : ""}</span></div>
          <div class="stat"><span class="val">${res.booking ? "Có" : "Vãng lai"}</span><span class="lbl">Đặt trước</span></div>
        </div>
        <div class="card card-pad" style="margin-top:14px;border-color:rgba(56,189,248,.35);">
          <div style="display:flex;gap:10px;align-items:center;">
            <span style="color:var(--color-info)">${SB.icon("bell",20)}</span>
            <span style="font-size:14px;">Thông báo qua loa: <em>"Mời anh/chị <strong>${m.name}</strong> vào <strong>Sân ${res.court}</strong>."</em></span>
          </div>
        </div>`;

      SB.announce(`Mời ${m.name} vào sân ${res.court}`);
      if (!res.deducted) SB.toast("Không trừ buổi", "Thành viên đã hết số buổi trong gói (tính vãng lai).", "warn");
      renderRecent();
    }

    function renderRecent() {
      const s = SB.load();
      const rows = s.courts.filter(c => c.checkinAt)
        .sort((a, b) => new Date(b.checkinAt) - new Date(a.checkinAt))
        .slice(0, 6);
      if (!rows.length) { document.getElementById("recent").textContent = "Chưa có dữ liệu."; return; }
      document.getElementById("recent").innerHTML = `<table class="tbl"><thead><tr><th>Giờ</th><th>Người chơi</th><th>Sân</th></tr></thead><tbody>` +
        rows.map(c => `<tr><td class="num">${SB.fmtTime(new Date(c.checkinAt))}</td><td>${c.players.map(p => p.name).join(", ") || "—"}</td><td>Sân ${c.id}</td></tr>`).join("") +
        `</tbody></table>`;
    }

    renderPicker(); renderRecent();
    window.addEventListener("sbadm:update", () => { renderPicker(); renderRecent(); });
  </script>
</body>
</html>
