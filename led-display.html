<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Màn LED tại sân — Smart Pickleball</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    .led-grid { display:grid; grid-template-columns: 1.1fr 1fr; gap:20px; }
    @media (max-width: 900px){ .led-grid{ grid-template-columns:1fr; } }
  </style>
</head>
<body class="bg-app">
  <div id="topbar"></div>
  <main class="container" style="padding-top:24px;padding-bottom:56px;">
    <div class="led-grid">
      <!-- Trái: màn LED đang chiếu -->
      <div class="grid" style="gap:20px;align-content:start;">
        <!-- Màn LED — nội dung đang chiếu -->
        <div class="card card-pad">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <div style="font-weight:600;display:flex;align-items:center;gap:8px;"><span id="var-ic"></span> Màn LED — Nội dung đang chiếu</div>
            <span class="badge badge-slate" id="led-status">Đang trống</span>
          </div>
          <div id="led-screen" style="position:relative;aspect-ratio:16/9;border-radius:12px;overflow:hidden;background:#0a0e13;border:1px solid var(--color-border);"></div>
          <div style="display:flex;gap:10px;margin-top:12px;">
            <button class="btn btn-ghost" id="stop-btn">Dừng chiếu</button>
          </div>
        </div>
      </div>

      <!-- Phải: Thư viện chiếu + xếp người -->
      <div class="grid" style="gap:20px;align-content:start;">
        <!-- Thư viện video đoạn cut -->
        <div class="card card-pad">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
            <div style="font-weight:700;font-size:18px;">Thư viện video (đoạn cut)</div>
            <button class="btn btn-primary btn-sm" id="upload-btn"></button>
          </div>
          <p class="muted" style="margin:-6px 0 12px;font-size:13px;">Chọn một đoạn cut để chiếu lên màn LED tại sân, hoặc tải video của khách lên.</p>
          <div id="clip-list" class="grid" style="gap:10px;"></div>
          <input type="file" id="file-input" accept="video/*" style="display:none;" />
        </div>

        <!-- Xếp người theo trình độ -->
        <div class="card card-pad" style="display:flex;flex-direction:column;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
            <div style="font-weight:700;font-size:18px;">Xếp người chơi theo trình độ</div>
            <span class="badge badge-green">Tự động</span>
          </div>
          <div id="placement" class="grid" style="gap:12px;align-content:start;flex:1;"></div>
          <div class="card card-pad" style="margin-top:14px;border-color:rgba(76,155,214,.35);">
            <div style="display:flex;gap:10px;align-items:center;">
              <span style="color:var(--color-info)" id="ann-ic"></span>
              <span id="ann-text" style="font-size:15px;">Hệ thống sẽ tự thông báo khi có người check-in.</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="assets/app.js"></script>
  <script>
    document.getElementById("topbar").innerHTML = SB.topbar("led-display.html");
    document.getElementById("var-ic").innerHTML = SB.icon("play", 18);
    document.getElementById("ann-ic").innerHTML = SB.icon("bell", 20);
    document.getElementById("upload-btn").innerHTML = SB.icon("play", 14) + " Tải video lên";

    function renderPlacement() {
      const s = SB.load();
      const groups = {};
      s.courts.forEach(c => c.players.forEach(p => { (groups[p.level] = groups[p.level] || []).push({ ...p, court: c.id }); }));
      const order = Object.keys(SB.LEVELS).sort((a, b) => SB.LEVELS[b].order - SB.LEVELS[a].order);
      const el = document.getElementById("placement");
      if (!Object.keys(groups).length) { el.innerHTML = `<div class="muted" style="text-align:center;padding:30px;">Chưa có người chơi. Hãy check-in tại kiosk.</div>`; return; }
      el.innerHTML = order.filter(lv => groups[lv]).map(lv => {
        const info = SB.LEVELS[lv];
        return `<div class="card card-pad" style="padding:14px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <div style="font-weight:700;font-size:16px;"><span class="level-dot ${info.cls}"></span> ${info.name}</div>
            <span class="badge badge-slate">${groups[lv].length} người</span>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;">
            ${groups[lv].map(p => `<span class="badge" style="font-size:13px;padding:5px 10px;">${p.name} · Sân ${p.court}</span>`).join("")}
          </div>
        </div>`;
      }).join("");
    }

    // ---- Màn LED: nội dung đang chiếu ----
    let ledTimer = null;
    function renderLedScreen() {
      const led = SB.getLed();
      const screen = document.getElementById("led-screen");
      const status = document.getElementById("led-status");
      if (ledTimer) { clearInterval(ledTimer); ledTimer = null; }
      if (!led || !led.nowPlaying) {
        status.textContent = "Đang trống"; status.className = "badge badge-slate";
        screen.innerHTML = `<div style="position:absolute;inset:0;display:grid;place-items:center;text-align:center;color:var(--color-muted-fg);padding:20px;">
          <div>${SB.icon("monitor", 30)}<div style="margin-top:8px;font-size:14px;">Màn hình trống — chọn một video ở thư viện để chiếu</div></div></div>`;
        return;
      }
      const c = led.nowPlaying;
      status.textContent = "Đang chiếu"; status.className = "badge badge-red";
      screen.innerHTML = `
        <div style="position:absolute;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 50% 40%, #16202b, #080b0f);">
          <div style="text-align:center;padding:20px;">
            <div style="color:var(--color-accent);margin-bottom:10px;display:flex;justify-content:center;">${SB.icon("play", 38)}</div>
            <div style="font-weight:700;font-size:18px;max-width:90%;margin:0 auto;">${c.title}</div>
            <div class="muted" style="font-size:13px;margin-top:4px;">${c.source} · ${c.durSec}s · Sân ${led.court}</div>
          </div>
        </div>
        <div class="badge badge-red" style="position:absolute;left:10px;top:10px;"><span class="live-dot"></span> ĐANG CHIẾU</div>
        <div class="num" id="led-time" style="position:absolute;right:10px;top:10px;font-size:12px;color:var(--color-muted-fg);">0:00</div>
        <div style="position:absolute;left:0;right:0;bottom:0;height:4px;background:rgba(255,255,255,.1);"><div id="led-prog" style="height:100%;width:0;background:var(--color-accent);transition:width .2s linear;"></div></div>`;
      const start = Date.now();
      ledTimer = setInterval(() => {
        const prog = document.getElementById("led-prog");
        const tEl = document.getElementById("led-time");
        if (!prog) { clearInterval(ledTimer); ledTimer = null; return; }
        const elapsed = ((Date.now() - start) / 1000) % c.durSec;   // phát lặp
        prog.style.width = (elapsed / c.durSec * 100) + "%";
        tEl.textContent = "0:" + SB.pad(Math.floor(elapsed));
      }, 200);
    }

    // ---- Thư viện đoạn cut ----
    function renderClips() {
      const s = SB.load();
      const led = s.led || {};
      const el = document.getElementById("clip-list");
      if (!s.clips.length) { el.innerHTML = `<div class="muted" style="text-align:center;padding:16px;">Chưa có video nào. Bấm "Tải video lên" để thêm.</div>`; return; }
      el.innerHTML = s.clips.map(c => {
        const playing = led.nowPlaying && led.nowPlaying.id === c.id;
        return `<div class="card" style="padding:10px;display:flex;gap:12px;align-items:center;${playing ? "border-color:var(--color-accent);" : ""}">
          <div style="width:60px;height:38px;border-radius:6px;background:linear-gradient(135deg,#16202b,#0b1016);display:grid;place-items:center;color:var(--color-muted-fg);flex:none;">${SB.icon("play", 15)}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.title}</div>
            <div class="muted" style="font-size:12px;">${c.source} · ${c.durSec}s</div>
          </div>
          ${playing
            ? `<span class="badge badge-green" style="flex:none;">Đang chiếu</span>`
            : `<button class="btn btn-sm btn-primary cast" data-id="${c.id}" style="flex:none;">Chiếu</button>`}
          <button class="btn btn-sm btn-ghost del" data-id="${c.id}" title="Xoá video" style="flex:none;padding:0 10px;">✕</button>
        </div>`;
      }).join("");
      el.querySelectorAll(".cast").forEach(b => b.onclick = () => {
        const c = SB.castToLed(b.dataset.id);
        SB.toast("Đang chiếu lên màn LED", c.title, "ok");
        SB.announce("Mời quý khách theo dõi video trên màn hình lớn tại sân");
        renderLedScreen(); renderClips();
      });
      el.querySelectorAll(".del").forEach(b => b.onclick = () => { SB.removeClip(b.dataset.id); renderClips(); renderLedScreen(); });
    }

    document.getElementById("stop-btn").onclick = () => { SB.stopLed(); SB.toast("Đã dừng chiếu", "Màn LED trở về trạng thái trống.", "info"); renderLedScreen(); renderClips(); };

    // Tải video lên (mô phỏng — chỉ lấy tên tệp)
    document.getElementById("upload-btn").onclick = () => document.getElementById("file-input").click();
    document.getElementById("file-input").onchange = (e) => {
      const f = e.target.files[0]; if (!f) return;
      const name = f.name.replace(/\.[^.]+$/, "");
      SB.addClip({ title: name, source: "Khách tải lên", durSec: 15, court: 3 });
      SB.toast("Đã thêm video", name, "ok");
      renderClips();
      e.target.value = "";
    };

    // Khi có check-in mới từ kiosk -> cập nhật xếp người + loa
    function onUpdate() {
      renderPlacement(); renderLedScreen(); renderClips();
      const s = SB.load();
      if (s.lastCheckin) {
        document.getElementById("ann-text").innerHTML =
          `Mời <strong>${s.lastCheckin.name}</strong> (${SB.LEVELS[s.lastCheckin.level].name}) vào <strong>Sân ${s.lastCheckin.court}</strong>.`;
      }
    }

    renderPlacement(); renderLedScreen(); renderClips(); onUpdate();
    window.addEventListener("sbadm:update", onUpdate);
    window.addEventListener("storage", onUpdate);
  </script>
</body>
</html>
