<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Quản trị Smart Pickleball</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/admin.css" />
</head>
<body>
  <div class="admin">
    <div id="side"></div>
    <div class="a-main">
      <div id="top"></div>
      <div class="a-content">
        <div class="grid" id="kpis" style="grid-template-columns:repeat(5,1fr);margin-bottom:18px;"></div>

        <div class="grid" style="grid-template-columns:1.4fr 1fr;margin-bottom:18px;align-items:start;">
          <div class="card">
            <div class="card-hd"><h3>Trạng thái sân</h3><span class="badge b-red" id="live"><span class="dot" style="background:currentColor"></span> Trực tiếp</span></div>
            <div class="card-pad"><div class="grid" id="courtmap" style="grid-template-columns:repeat(3,1fr);"></div></div>
          </div>
          <div class="card">
            <div class="card-hd"><h3>Dòng tiền (sổ)</h3></div>
            <div class="card-pad" id="cash"></div>
          </div>
        </div>

        <div class="grid" style="grid-template-columns:1.4fr 1fr;align-items:start;">
          <div class="card">
            <div class="card-hd"><h3>Doanh thu theo giờ hôm nay</h3></div>
            <div class="card-pad"><canvas id="rev" height="150"></canvas></div>
          </div>
          <div class="card">
            <div class="card-hd"><h3>Cảnh báo no-show</h3></div>
            <div class="card-pad" id="noshow"></div>
          </div>
        </div>

        <div class="card" style="margin-top:18px;">
          <div class="card-hd"><h3>Lịch đặt sân hôm nay</h3><a href="courts.html" class="btn btn-sm btn-ghost">Xem lịch sân</a></div>
          <div class="scroll-x"><table class="tbl" id="bookings"></table></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="assets/app.js"></script>
  <script>
    document.getElementById("side").innerHTML = SB.adminSidebar("dashboard");
    document.getElementById("top").innerHTML = SB.adminTop("Dashboard", "Tổng quan vận hành sân", `<button class="btn btn-ghost btn-sm" onclick="if(confirm('Đặt lại dữ liệu demo?')){SB.reset();location.reload()}">Reset demo</button>`);

    let revChart = null;
    function render() {
      const s = SB.load();
      const occupied = s.courts.filter(c => c.status === "occupied");
      const players = s.courts.reduce((n, c) => n + c.players.length, 0);
      const noshows = SB.detectNoShows();
      const pending = s.orders.filter(o => o.status === "Chờ thanh toán").length;
      const cash = SB.cashSummary();

      document.getElementById("kpis").innerHTML = [
        [SB.fmtVND(s.revenueToday), "Doanh thu hôm nay", "up", "+ hôm nay"],
        [occupied.length + "/" + s.courts.length, "Sân đang hoạt động", "", players + " người chơi"],
        [s.members.length, "Khách hàng", "", "toàn hệ thống"],
        [pending, "Đơn chờ thu", pending ? "down" : "", pending ? "cần xử lý" : "ổn"],
        [SB.fmtVND(cash.net), "Lãi/lỗ (sổ)", cash.net >= 0 ? "up" : "down", "thu − chi"],
      ].map(([v, l, cls, d]) =>
        `<div class="kpi"><div class="lbl">${l}</div><div class="val">${v}</div><div class="delta ${cls}">${d}</div></div>`).join("");

      // Court map
      const now = Date.now();
      document.getElementById("courtmap").innerHTML = s.courts.map(c => {
        const overdue = noshows.some(b => b.court === c.id);
        const badge = overdue ? `<span class="badge b-red">Quá giờ</span>` : (c.status === "occupied" ? `<span class="badge b-green">Đang chơi</span>` : `<span class="badge b-gray">Trống</span>`);
        let dur = c.checkinAt ? `<span class="muted num" style="font-size:12px">${Math.floor((now - new Date(c.checkinAt)) / 60000)} phút</span>` : "";
        return `<div class="card card-pad" style="box-shadow:none;${overdue ? "border-color:var(--danger)" : c.status === "occupied" ? "border-color:var(--accent)" : ""}">
          <div class="between"><strong style="font-size:14px">${c.name}</strong>${badge}</div>
          <div class="muted" style="font-size:12px;margin:6px 0;">${c.type} · ${SB.fmtVND(c.pricePerHour)}/h</div>
          <div style="min-height:20px;font-size:13px">${c.players.map(p => p.name).join(", ") || '<span class="muted">—</span>'}</div>
          <div class="between" style="margin-top:8px">${dur || "<span></span>"}
            <div class="row" style="gap:6px">
              <button class="btn btn-sm ${c.light ? "btn-primary" : "btn-ghost"}" title="Đèn" onclick="tLight(${c.id})">${SB.icon("light", 14)}</button>
              ${c.status === "occupied" ? `<button class="btn btn-sm btn-ghost" title="Trả sân" onclick="rel(${c.id})">${SB.icon("check", 14)}</button>` : ""}
            </div>
          </div>
        </div>`;
      }).join("");

      // Cash
      const maxv = Math.max(cash.thu, cash.chi, 1);
      document.getElementById("cash").innerHTML = `
        <div style="margin-bottom:14px"><div class="between"><span class="text-2">Tổng thu</span><strong class="num up">${SB.fmtVND(cash.thu)}</strong></div><div class="bar" style="margin-top:6px"><span style="width:${cash.thu / maxv * 100}%"></span></div></div>
        <div style="margin-bottom:14px"><div class="between"><span class="text-2">Tổng chi</span><strong class="num down">${SB.fmtVND(cash.chi)}</strong></div><div class="bar" style="margin-top:6px"><span style="width:${cash.chi / maxv * 100}%;background:var(--danger)"></span></div></div>
        <hr class="divider"/>
        <div class="between"><span style="font-weight:600">Lợi nhuận</span><strong class="num" style="font-size:18px;color:${cash.net >= 0 ? "var(--accent-ink)" : "var(--danger)"}">${SB.fmtVND(cash.net)}</strong></div>
        <a href="cashflow.html" class="btn btn-sm btn-ghost btn-block" style="margin-top:14px">Xem sổ thu chi</a>`;

      // No-show
      const ns = document.getElementById("noshow");
      ns.innerHTML = noshows.length ? noshows.map(b =>
        `<div class="between" style="padding:8px 0;border-bottom:1px solid var(--border-2)">
           <div><strong>Sân ${b.court}</strong> · ${b.memberName}<div class="muted" style="font-size:12px">Đặt ${SB.fmtTime(new Date(b.start))}</div></div>
           <button class="btn btn-sm btn-danger" onclick="freeUp(${b.court})">Báo trống</button>
         </div>`).join("") : `<div class="muted" style="padding:14px 0">Không có sân nào quá giờ check-in.</div>`;

      // Bookings table
      document.getElementById("bookings").innerHTML =
        `<thead><tr><th>Giờ</th><th>Khách</th><th>Sân</th><th>Thời lượng</th><th class="right">Tiền</th><th>Trạng thái</th></tr></thead><tbody>` +
        s.bookings.slice().sort((a, b) => new Date(a.start) - new Date(b.start)).map(b => {
          const st = b.checkedIn ? `<span class="badge b-green">Đã vào</span>` : (noshows.some(n => n.id === b.id) ? `<span class="badge b-red">No-show</span>` : `<span class="badge b-amber">Chờ</span>`);
          return `<tr><td class="num">${SB.fmtTime(new Date(b.start))}</td><td>${b.memberName}</td><td>Sân ${b.court}</td><td class="num">${b.durationMin}p</td><td class="num right">${SB.fmtVND(b.price)}</td><td>${st}</td></tr>`;
        }).join("") + `</tbody>`;

      drawRev(s);
    }

    function drawRev(s) {
      const buckets = {};
      s.bookings.forEach(b => { const h = new Date(b.start).getHours(); buckets[h] = (buckets[h] || 0) + b.price; });
      const hours = Object.keys(buckets).map(Number).sort((a, b) => a - b);
      if (!window.Chart) return;
      const cfg = { labels: hours.map(h => SB.pad(h) + "h"), data: hours.map(h => buckets[h] / 1000) };
      if (revChart) { revChart.data.labels = cfg.labels; revChart.data.datasets[0].data = cfg.data; revChart.update(); return; }
      revChart = new Chart(document.getElementById("rev"), {
        type: "bar",
        data: { labels: cfg.labels, datasets: [{ label: "Nghìn đồng", data: cfg.data, backgroundColor: "#16A34A", borderRadius: 5, maxBarThickness: 34 }] },
        options: { plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => c.raw.toLocaleString("vi-VN") + ".000đ" } } },
          scales: { x: { grid: { display: false }, ticks: { color: "#5B6675" } }, y: { grid: { color: "#EDF0F3" }, ticks: { color: "#8A94A3" } } } },
      });
    }

    window.tLight = (id) => { const c = SB.toggleLight(id); SB.adminToast("Đèn Sân " + id, c.light ? "Đã bật" : "Đã tắt", c.light ? "ok" : "info"); };
    window.rel = (id) => { SB.releaseCourt(id); SB.adminToast("Sân " + id, "Đã trả sân.", "info"); };
    window.freeUp = (court) => {
      const s = SB.load(); const b = s.bookings.find(x => x.court === court && !x.checkedIn);
      if (b) { b.status = "no-show"; SB.save(s); }
      SB.releaseCourt(court); SB.adminToast("Sân " + court, "Đã báo trống.", "warn");
    };

    render();
    setInterval(render, 5000);
    window.addEventListener("sbadm:update", render);
    window.addEventListener("storage", render);
  </script>
</body>
</html>
